services:
  legal-postgres:
    image: pgvector/pgvector:pg16
    container_name: itegeko-legal-postgres
    environment:
      POSTGRES_DB: ${LEGAL_DB_NAME:-itegeko_legal}
      POSTGRES_USER: ${LEGAL_DB_USER:-itegeko_legal}
      POSTGRES_PASSWORD: ${LEGAL_DB_PASSWORD}
    ports:
      - "${LEGAL_DB_PORT:-5434}:5432"
    volumes:
      - legal-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  identity-postgres:
    image: postgres:16
    container_name: itegeko-identity-postgres
    environment:
      POSTGRES_DB: ${IDENTITY_DB_NAME:-itegeko_identity}
      POSTGRES_USER: ${IDENTITY_DB_USER:-itegeko_identity}
      POSTGRES_PASSWORD: ${IDENTITY_DB_PASSWORD}
    ports:
      - "${IDENTITY_DB_PORT:-5433}:5432"
    volumes:
      - identity-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: itegeko-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-itegeko}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: itegeko-keycloak
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "8081:8080"
    volumes:
      - ./infra/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro

  ai-service:
    build:
      context: ./ai-service
    container_name: itegeko-ai-service
    environment:
      LEGAL_SERVICE_URL: ${LEGAL_SERVICE_URL:-http://legal-service:8080}
      LEGAL_SERVICE_TIMEOUT_SECONDS: ${LEGAL_SERVICE_TIMEOUT_SECONDS:-10}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-384}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      MINIMUM_RELEVANCE_SCORE: ${MINIMUM_RELEVANCE_SCORE:-0.08}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "8000:8000"

  identity-service:
    build:
      context: ./identity-service
    container_name: itegeko-identity-service
    environment:
      DATABASE_URL: jdbc:postgresql://identity-postgres:5432/${IDENTITY_DB_NAME:-itegeko_identity}
      DATABASE_USERNAME: ${IDENTITY_DB_USER:-itegeko_identity}
      DATABASE_PASSWORD: ${IDENTITY_DB_PASSWORD}
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_ISSUER_URI:-http://localhost:8081/realms/itegeko}
      KEYCLOAK_JWK_SET_URI: ${KEYCLOAK_JWK_SET_URI:-http://keycloak:8080/realms/itegeko/protocol/openid-connect/certs}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "8082:8082"
    depends_on:
      identity-postgres:
        condition: service_healthy
      keycloak:
        condition: service_started

  legal-service:
    build:
      context: ./legal-service
    container_name: itegeko-legal-service
    environment:
      DATABASE_URL: jdbc:postgresql://legal-postgres:5432/${LEGAL_DB_NAME:-itegeko_legal}
      DATABASE_USERNAME: ${LEGAL_DB_USER:-itegeko_legal}
      DATABASE_PASSWORD: ${LEGAL_DB_PASSWORD}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://ai-service:8000}
      AI_REQUEST_TIMEOUT_MS: ${AI_REQUEST_TIMEOUT_MS:-10000}
      AI_MAX_RETRIES: ${AI_MAX_RETRIES:-2}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_ISSUER_URI:-http://localhost:8081/realms/itegeko}
      KEYCLOAK_JWK_SET_URI: ${KEYCLOAK_JWK_SET_URI:-http://keycloak:8080/realms/itegeko/protocol/openid-connect/certs}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-itegeko}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-itegeko-documents}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "8080:8080"
    depends_on:
      legal-postgres:
        condition: service_healthy
      ai-service:
        condition: service_started
      keycloak:
        condition: service_started
      minio:
        condition: service_started
      identity-service:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    container_name: itegeko-frontend
    environment:
      NEXT_PUBLIC_LEGAL_API_BASE_URL: ${NEXT_PUBLIC_LEGAL_API_BASE_URL:-http://legal-service:8080}
      NEXT_PUBLIC_IDENTITY_API_BASE_URL: ${NEXT_PUBLIC_IDENTITY_API_BASE_URL:-http://identity-service:8082}
      NEXT_PUBLIC_KEYCLOAK_URL: ${NEXT_PUBLIC_KEYCLOAK_URL:-http://localhost:8081}
      NEXT_PUBLIC_KEYCLOAK_REALM: ${NEXT_PUBLIC_KEYCLOAK_REALM:-itegeko}
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: ${NEXT_PUBLIC_KEYCLOAK_CLIENT_ID:-itegeko-frontend}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      legal-service:
        condition: service_started
      identity-service:
        condition: service_started

  law-scraper:
    build:
      context: .
      dockerfile: law-scraper/Dockerfile
    profiles:
      - tools
    environment:
      DATABASE_HOST: legal-postgres
      DATABASE_PORT: 5432
      LEGAL_DB_NAME: ${LEGAL_DB_NAME:-itegeko_legal}
      LEGAL_DB_USER: ${LEGAL_DB_USER:-itegeko_legal}
      LEGAL_DB_PASSWORD: ${LEGAL_DB_PASSWORD}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://ai-service:8000}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      LAW_SCRAPER_DB_MODE: direct
      LAW_SCRAPER_APPLY: ${LAW_SCRAPER_APPLY:-true}
      LAW_SCRAPER_INDEX: ${LAW_SCRAPER_INDEX:-true}
      LAW_SCRAPER_SKIP_EXISTING: ${LAW_SCRAPER_SKIP_EXISTING:-true}
      SCRAPER_SCOPE: ${SCRAPER_SCOPE:-companies}
      SCRAPER_DOCUMENT_TYPES: ${SCRAPER_DOCUMENT_TYPES:-}
      SCRAPER_MAX_DOCS: ${SCRAPER_MAX_DOCS:-5}
      SCRAPER_MAX_FOLDERS: ${SCRAPER_MAX_FOLDERS:-250}
      SCRAPER_MAX_PAGES: ${SCRAPER_MAX_PAGES:-80}
      SCRAPER_CHUNK_CHARS: ${SCRAPER_CHUNK_CHARS:-6000}
      SCRAPER_DELAY: ${SCRAPER_DELAY:-0.4}
    depends_on:
      legal-postgres:
        condition: service_healthy
      legal-service:
        condition: service_started
      ai-service:
        condition: service_started

volumes:
  legal-postgres-data:
  identity-postgres-data:
  minio-data:
