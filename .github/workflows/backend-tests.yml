name: Backend Tests

on:
  push:
    branches: [ main, feat/* ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      
      - name: Test Legal Service
        run: cd legal-service && mvn verify
        
      - name: Test Identity Service
        run: cd identity-service && mvn verify

      - name: Upload Java Coverage Reports
        uses: actions/upload-artifact@v4
        with:
          name: java-coverage-reports
          path: |
            legal-service/target/site/jacoco/
            identity-service/target/site/jacoco/

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install AI Service Dependencies
        run: |
          cd ai-service
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          
      - name: Test AI Service
        run: |
          cd ai-service
          export PYTHONPATH=$PYTHONPATH:.
          python -m pytest --cov=app --cov-report=xml --cov-report=term

      - name: Upload Python Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage-report
          path: ai-service/coverage.xml
