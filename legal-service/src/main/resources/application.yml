server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: itegeko-legal-service
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/itegeko_ai}
    username: ${DATABASE_USERNAME:itegeko}
    password: ${DATABASE_PASSWORD:itegeko}
    hikari:
      connection-init-sql: SET search_path TO legal, public
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: legal
    create-schemas: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: legal
        format_sql: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/itegeko}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8081/realms/itegeko/protocol/openid-connect/certs}

app:
  ai-service-url: ${AI_SERVICE_URL:http://localhost:8000}
  internal-api-key: ${INTERNAL_API_KEY:local-dev-internal-key}
  ai:
    request-timeout-ms: ${AI_REQUEST_TIMEOUT_MS:10000}
    max-retries: ${AI_MAX_RETRIES:2}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  storage:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:itegeko}
    secret-key: ${MINIO_SECRET_KEY:itegeko123}
    bucket: ${MINIO_BUCKET:itegeko-documents}

management:
  endpoints:
    web:
      exposure:
        include: health,info
