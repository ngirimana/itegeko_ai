server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: itegeko-identity-service
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/itegeko_ai}
    username: ${DATABASE_USERNAME:itegeko}
    password: ${DATABASE_PASSWORD}
  flyway:
    enabled: true
    schemas: identity
    create-schemas: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: identity
        format_sql: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/itegeko}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8081/realms/itegeko/protocol/openid-connect/certs}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
